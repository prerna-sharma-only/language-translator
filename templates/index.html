<!DOCTYPE html>
<html>
<head>
<title>AI Language Translator</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="app">

<h1>🌐 AI Language Translator</h1>

<form method="POST">

<div class="panels">

<!-- LEFT PANEL -->
<div class="card">

<textarea name="text" id="textInput" placeholder="Type or speak text..."></textarea>

<select name="source">
<option value="auto">Auto Detect</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="pt">Portuguese</option>
<option value="ru">Russian</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh-CN">Chinese</option>
<option value="ar">Arabic</option>
<option value="tr">Turkish</option>
<option value="nl">Dutch</option>
<option value="pl">Polish</option>
<option value="sv">Swedish</option>
</select>

<button type="button" id="micBtn">🎤 Voice Input</button>

</div>

<!-- RIGHT PANEL -->
<div class="card">

<div class="result">{{ result }}</div>

<select name="target">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="pt">Portuguese</option>
<option value="ru">Russian</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh-CN">Chinese</option>
<option value="ar">Arabic</option>
<option value="tr">Turkish</option>
<option value="nl">Dutch</option>
<option value="pl">Polish</option>
<option value="sv">Swedish</option>
</select>

<button type="submit" class="translateBtn">Translate</button>

</div>

</div>

</form>

</div>

<script src="{{ url_for('static', filename='voice.js') }}"></script>

</body>
</html>
